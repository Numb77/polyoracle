version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8765:8765"
    volumes:
      - ./logs:/app/logs

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser connects to the bot's WS server — localhost works because
      # port 8765 is exposed from the bot container to the host.
      - NEXT_PUBLIC_WS_URL=ws://localhost:8765
      - DOCKER_BUILD=true
    depends_on:
      - bot
